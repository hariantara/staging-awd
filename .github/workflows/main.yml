name: RDP_LINUX_FULL

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update & Install Desktop Environment
        run: |
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 xfce4-goodies xrdp dbus-x11

          # Set XFCE session for RDP
          echo "startxfce4" > ~/.xsession
          sudo cp ~/.xsession /etc/skel/.xsession

          # Start xrdp service
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Create RDP User
        run: |
          USERNAME="rdp"
          PASSWORD=$(openssl rand -base64 12)

          # Create user if not exists
          id -u $USERNAME &>/dev/null || sudo useradd -m -s /bin/bash $USERNAME

          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME

          # Save credentials
          echo "RDP_USER=$USERNAME" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Fix Permissions
        run: |
          sudo adduser xrdp ssl-cert || true

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-linux-${{ github.run_id }}

          # Wait for IP
          for i in {1..15}; do
            TS_IP=$(tailscale ip -4)
            if [ ! -z "$TS_IP" ]; then break; fi
            sleep 4
          done

          if [ -z "$TS_IP" ]; then
            echo "Failed to get Tailscale IP"
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Open RDP Port
        run: |
          sudo ufw allow 3389 || true

      - name: Verify RDP Port
        run: |
          sudo ss -tulpn | grep 3389 || (echo "RDP not running" && exit 1)

      - name: Show Connection Info
        run: |
          echo ""
          echo "========= RDP ACCESS ========="
          echo "IP Address : $TAILSCALE_IP"
          echo "Username   : $RDP_USER"
          echo "Password   : $RDP_PASS"
          echo "=============================="
          echo ""

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] RDP Active..."
            sleep 300
          done
